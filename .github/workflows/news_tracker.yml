name: NH News Tracker

on:
  workflow_dispatch:
    # Triggered externally via GitHub REST API by cron-job.org every Monday 06:00 UTC.
    # Native GitHub `schedule:` cron is unreliable, so we rely on the external trigger.
  schedule:
    # Belt-and-braces fallback. May not fire reliably; cron-job.org is the primary trigger.
    - cron: "0 6 * * 1"

permissions:
  contents: write   # needed to commit CSV + last_run.json back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news tracker
        env:
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
          EMAIL_RECIPIENTS:    ${{ secrets.EMAIL_RECIPIENTS }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT }}
          INCLUDE_MENTIONED:   ${{ vars.INCLUDE_MENTIONED }}
        run: python -m tracker.fetch_news

      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ tracker/last_run.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Weekly news digest $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Nothing to commit."
          fi
